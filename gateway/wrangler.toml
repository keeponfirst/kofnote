name = "kofnote-gateway"
main = "src/index.js"
compatibility_date = "2024-12-01"

# ─── KV Namespace（用量快取）───
[[kv_namespaces]]
binding = "USAGE_CACHE"
id = "YOUR_KV_NAMESPACE_ID"          # wrangler kv:namespace create USAGE_CACHE
preview_id = "YOUR_PREVIEW_KV_ID"    # wrangler kv:namespace create USAGE_CACHE --preview

# ─── 環境變數（開發用，正式用 wrangler secret put）───
[vars]
SUPABASE_URL = "https://your-project.supabase.co"
CORS_ORIGIN = "*"

# ─── Secrets（正式部署用 `wrangler secret put`）───
# SUPABASE_SERVICE_ROLE_KEY
# SUPABASE_JWT_SECRET
# GEMINI_API_KEY
# ANTHROPIC_API_KEY

# ─── 路由（正式部署時設定）───
# [env.production]
# routes = [
#   { pattern = "api.kofnote.com/api/*", zone_name = "kofnote.com" }
# ]
